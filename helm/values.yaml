replicaCount: 2

image:
  repository: your-ecr-repo/sample-app   # replace with your ECR URI
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  SERVICE_NAME: sample-app
  SERVICE_VERSION: "1.0.0"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Datadog log collection config injected via pod annotations
datadog:
  # Tells Datadog agent to parse logs as JSON and tag with service/source
  logSource: python
  logService: sample-app

# Traffic generator sidecar / separate deployment
loadGenerator:
  enabled: true
  targetUrl: "http://sample-app"
  requestsPerSecond: 5
  escalationIntervalSeconds: 60  # seconds per phase before alert severity ramps up
