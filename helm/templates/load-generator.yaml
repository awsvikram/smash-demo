{{- if .Values.loadGenerator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-load-gen
  labels:
    app: {{ .Release.Name }}-load-gen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-load-gen
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-load-gen
    spec:
      containers:
        - name: load-gen
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install -q requests && python3 - <<'EOF'
              import requests, time, uuid, random, os

              target = os.getenv("TARGET_URL", "http://sample-app")
              rps = float(os.getenv("RPS", "5"))

              # Scenario: every ESCALATION_INTERVAL seconds, alert severity ramps up
              # warning -> high -> critical, and alert share of traffic increases
              # This drives correlated memory + CPU growth you can triage in Datadog/Kibana
              ESCALATION_INTERVAL = int(os.getenv("ESCALATION_INTERVAL", "60"))  # seconds per phase

              phases = [
                  # (alert_weight, normal_weight, severity)
                  (1, 9, "warning"),   # phase 1: mostly normal, some warnings
                  (3, 7, "warning"),   # phase 2: more warnings
                  (5, 5, "high"),      # phase 3: half traffic is high alerts
                  (7, 3, "high"),      # phase 4: mostly high alerts
                  (9, 1, "critical"),  # phase 5: critical alert storm
              ]

              start = time.time()
              print(f"Starting load gen -> {target} at {rps} req/s, escalating every {ESCALATION_INTERVAL}s")

              while True:
                  elapsed = time.time() - start
                  phase_idx = min(int(elapsed // ESCALATION_INTERVAL), len(phases) - 1)
                  alert_w, normal_w, severity = phases[phase_idx]

                  headers = {
                      "X-Trace-Id": str(uuid.uuid4()),
                      "X-Message-Id": str(uuid.uuid4()),
                  }

                  # Weighted random: alert vs normal traffic
                  if random.randint(1, 10) <= alert_w:
                      path = f"/alert?severity={severity}"
                  else:
                      path = random.choice(["/", "/process?type=order", "/process?type=event"])

                  try:
                      r = requests.get(f"{target}{path}", headers=headers, timeout=10)
                      print(f"phase={phase_idx+1} severity={severity} {r.status_code} {path}")
                  except Exception as e:
                      print(f"ERROR: {e}")

                  time.sleep(1.0 / rps)
              EOF
          env:
            - name: TARGET_URL
              value: {{ .Values.loadGenerator.targetUrl | quote }}
            - name: RPS
              value: {{ .Values.loadGenerator.requestsPerSecond | quote }}
            - name: ESCALATION_INTERVAL
              value: {{ .Values.loadGenerator.escalationIntervalSeconds | quote }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
{{- end }}
